<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David Green | V&A Waterfront</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --surface: rgba(255,255,255,0.9);
      --text: #14212b;
      --muted: #5b6b75;
      --brand: #0c5a74;
      --brand-2: #1389a6;
      --line: rgba(20,33,43,0.1);
      --shadow: 0 20px 60px rgba(0,0,0,0.12);
      --radius: 22px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .hero {
      min-height: 100vh;
      position: relative;
      color: white;
      background:
        linear-gradient(180deg, rgba(9,20,29,0.22), rgba(9,20,29,0.76)),
        url('https://media.licdn.com/dms/image/v2/D4D16AQEjAUZZrstEPQ/profile-displaybackgroundimage-shrink_350_1400/profile-displaybackgroundimage-shrink_350_1400/0/1737533582633?e=1775088000&v=beta&t=KNvQ3oXW_hrF9bfMmLJKtGrMZHcD4mjo8HDPqs03jco') center/cover no-repeat;
      overflow: hidden;
    }

    .nav {
      max-width: var(--max);
      margin: 0 auto;
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .nav .brand {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .hero-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 50px 24px 90px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 36px;
      align-items: end;
    }

    .profile-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .profile-card img {
      width: 138px;
      height: 138px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.7);
      margin-bottom: 18px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
      opacity: 0.78;
      margin-bottom: 8px;
    }
